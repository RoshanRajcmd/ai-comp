version: '3.9'

services:
  # Backend Service (Flask + Whisper/Piper)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app # Mount the code for live reloading
      - ./models:/app/models # Mount Piper voice models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_API_URL=http://host.docker.internal:11434
    # command: gunicorn -w 4 -b 0.0.0.0:5000 app:app # Use Gunicorn for production
    command: python -u app.py # Use Flask dev server for development ease

  # Frontend Service (React UI)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app # Mount the code for live reloading
      - /app/node_modules # Necessary to prevent host node_modules from overwriting container's
    environment:
      - NODE_ENV=development
      # Tell React where the Flask API is located (from the browser's perspective)
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend